# frontend/default.conf
server {
    listen 80;
    server_name _;  # Accept any host

    root /usr/share/nginx/html;
    index index.html;

    # API proxy (keep this - it's working!)
    location /api/ {
        proxy_pass http://backend:4001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # ✅ FIX: Redirect /admin → /admin/ preserving host:port
    location = /admin {
        return 301 $scheme://$http_host/admin/;
    }
    location = /api-docs { 
        return 301 $scheme://$http_host/api-docs/; 
    }
    location = /signup { 
        return 301 $scheme://$http_host/signup/; 
    }

    # SPA fallback for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /_next/static {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}