<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - FactoryOS AI</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#1A365D 0%,#3182CE 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;}
        .login-container{background:white;padding:40px;border-radius:12px;width:400px;box-shadow:0 20px 40px rgba(0,0,0,0.1);}
        h1{color:#1A365D;margin-bottom:10px;}
        .form-group{margin-bottom:20px;}
        label{display:block;margin-bottom:8px;font-weight:500;}
        input{width:100%;padding:12px;border:1px solid #E2E8F0;border-radius:8px;font-size:16px;}
        button{width:100%;padding:12px;background:#3182CE;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;}
        button:hover{background:#2C5282;}
        .error{color:#E53E3E;margin-top:10px;text-align:center;display:none;}
        .back-link{text-align:center;margin-top:20px;}
        a{color:#3182CE;text-decoration:none;}
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Admin Login</h1>
        <p>Enter your credentials to access the admin dashboard</p>
        <form id="loginForm">
            <div class="form-group"><label>Email</label><input type="email" id="email" value="admin@factoryos.ai" required></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" value="admin123" required></div>
            <button type="submit">Login to Admin Dashboard</button>
            <div id="errorMsg" class="error">Invalid credentials. Use admin@factoryos.ai / admin123</div>
        </form>
        <div class="back-link"><a href="/">â† Back to Home</a></div>
    </div>
    <script>
        const ADMIN_EMAIL = 'admin@factoryos.ai';
        const ADMIN_PASSWORD = 'admin123';
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                sessionStorage.setItem('admin_logged_in', 'true');
                const redirect = new URLSearchParams(window.location.search).get('redirect') || '/admin';
                window.location.href = redirect;
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
